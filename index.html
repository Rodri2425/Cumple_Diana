<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Feliz Cumpleaños Diana! 🎉</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #canvas-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Contenedor principal: dos columnas en desktop, una columna en móvil */
  .scene {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(16px, 3vw, 48px);
    padding: clamp(12px, 2vw, 24px);
    width: 100%;
    max-width: 900px;
  }

  /* Columna izquierda: textos y botón */
  .col-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-width: 0;
  }

  /* Columna derecha: foto */
  .col-foto {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .emoji-row {
    font-size: clamp(1.2rem, 3.5vw, 2.2rem);
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity 1s ease;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  }
  .emoji-row.visible { opacity: 1; }

  .main-title {
    font-size: clamp(1.6rem, 4.5vw, 3.8rem);
    font-weight: bold;
    letter-spacing: 0.04em;
    line-height: 1.2;
    color: transparent;
    background: linear-gradient(135deg, #b8860b 0%, #ffd700 30%, #fffacd 50%, #ffd700 70%, #b8860b 100%);
    -webkit-background-clip: text;
    background-clip: text;
    opacity: 0;
    transform: scale(0.3) translateY(40px);
    transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 18px rgba(255, 215, 0, 0.6));
    text-align: center;
  }
  .main-title.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .subtitle {
    font-size: clamp(0.6rem, 1.6vw, 1rem);
    color: #ffd700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    margin-top: 8px;
    transition: opacity 1.4s ease 0.4s;
    text-align: center;
  }
  .subtitle.visible { opacity: 0.85; }

  .message {
    font-size: clamp(0.72rem, 1.6vw, 0.95rem);
    color: #ffe88a;
    max-width: 340px;
    margin: 10px auto 0;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 1.2s ease;
    font-style: italic;
    text-align: center;
  }
  .message.visible { opacity: 0.9; }

  .sparkle-btn {
    margin-top: 18px;
    background: linear-gradient(135deg, #b8860b, #ffd700, #b8860b);
    border: none;
    border-radius: 50px;
    padding: clamp(8px, 1.2vw, 12px) clamp(18px, 2.5vw, 30px);
    font-size: clamp(0.75rem, 1.4vw, 1rem);
    font-weight: bold;
    color: #1a0a00;
    cursor: pointer;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 1s ease, transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
  }
  .sparkle-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
  }
  .sparkle-btn.visible { opacity: 1; }

  /* Foto vertical (rectángulo redondeado) */
  .foto-diana {
    width: clamp(90px, 18vw, 200px);
    height: clamp(150px, 30vw, 320px);
    border-radius: 18px;
    object-fit: cover;
    object-position: center top;
    border: 3px solid #ffd700;
    box-shadow: 0 0 28px rgba(255, 215, 0, 0.55), 0 0 60px rgba(255, 215, 0, 0.2);
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .foto-diana.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ── MÓVIL: apilado vertical ── */
  @media (max-width: 540px) {
    .scene {
      flex-direction: column;
      gap: 10px;
      padding: 10px 14px;
      justify-content: center;
      height: 100vh;
    }
    .col-foto { order: 3; }
    .col-text { order: 1; width: 100%; }

    .foto-diana {
      width: clamp(80px, 32vw, 130px);
      height: clamp(120px, 48vw, 200px);
    }
    .sparkle-btn { margin-top: 10px; }
  }

  /* Globos y efectos */
  .balloon {
    position: fixed;
    bottom: -120px;
    font-size: 3rem;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 5;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-4deg); opacity: 0; }
    5%   { opacity: 1; }
    50%  { transform: translateY(-50vh) rotate(4deg); }
    95%  { opacity: 1; }
    100% { transform: translateY(-110vh) rotate(-4deg); opacity: 0; }
  }

  .star-burst {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 6;
    animation: burst 1.2s ease-out forwards;
  }
  @keyframes burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="scene">
  <!-- Textos y botón -->
  <div class="col-text">
    <div class="emoji-row" id="emoji">🎂 🎉 🎁</div>
    <h1 class="main-title" id="title">¡Feliz Cumpleañooos<br>Dianaaa!</h1>
    <p class="subtitle" id="sub">✨ Que este día sea muy especial y bendecido para ti ✨</p>
    <p class="message" id="msg">
      Que cada momento de hoy esté lleno de alegría, amor y todo lo que te mereces.<br>
      ¡Que la pases geniaaaal! 🥂
    </p>
    <button class="sparkle-btn" id="btn" onclick="moreBurst()">✨ ¡Más Magia! ✨</button>
  </div>

  <!-- Foto -->
  <div class="col-foto">
    <img src="foto.jpeg" alt="Diana" class="foto-diana" id="foto">
  </div>
</div>

<script>
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(fromTop) {
    this.x = Math.random() * W;
    this.y = fromTop ? (Math.random() * -200 - 20) : (Math.random() * H);
    this.size = Math.random() * 8 + 4;
    this.speedY = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 1.5;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.12;
    this.shape = Math.floor(Math.random() * 3);
    const palette = ['#ffd700','#ff6b9d','#c0392b','#3498db','#2ecc71','#9b59b6','#f39c12','#e74c3c','#ffffff','#ffe082'];
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.alpha = Math.random() * 0.5 + 0.7;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.y / 40) * 0.4;
    this.rot += this.rotSpeed;
    if (this.y > H + 20) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle = this.color;
    if (this.shape === 0) {
      ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
    } else if (this.shape === 1) {
      ctx.beginPath();
      ctx.arc(0, 0, this.size/2, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI/2;
        const ia = a + (2 * Math.PI / 5) / 2;
        const r = this.size/2, ri = r * 0.4;
        if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
        else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        ctx.lineTo(Math.cos(ia)*ri, Math.sin(ia)*ri);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

class Sparkle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 2 + 0.5;
    this.alpha = Math.random();
    this.speed = Math.random() * 0.02 + 0.005;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.phase += this.speed;
    this.alpha = 0.3 + 0.7 * Math.abs(Math.sin(this.phase));
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

let sparkles = [];
let confettiActive = false;

function init() {
  for (let i = 0; i < 80; i++) sparkles.push(new Sparkle());
}
init();

function startConfetti() {
  confettiActive = true;
  for (let i = 0; i < 120; i++) particles.push(new Particle());
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  sparkles.forEach(s => { s.update(); s.draw(); });
  if (confettiActive) particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();

function reveal() {
  setTimeout(() => document.getElementById('emoji').classList.add('visible'), 400);
  setTimeout(() => {
    document.getElementById('title').classList.add('visible');
    startConfetti();
    launchBalloons();
  }, 900);
  setTimeout(() => document.getElementById('sub').classList.add('visible'), 1800);
  setTimeout(() => document.getElementById('msg').classList.add('visible'), 2400);
  setTimeout(() => document.getElementById('foto').classList.add('visible'), 2800);
  setTimeout(() => document.getElementById('btn').classList.add('visible'), 3400);
}

const balloonEmojis = ['🎈','🎈','🎁','🎀','🌟','💛','🎊','🎈'];
function launchBalloons() {
  function spawnBalloon() {
    const b = document.createElement('div');
    b.className = 'balloon';
    b.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
    b.style.left = (Math.random() * 90 + 5) + '%';
    const dur = (Math.random() * 6 + 8) + 's';
    b.style.animationDuration = dur;
    b.style.animationDelay = (Math.random() * 3) + 's';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), parseFloat(dur) * 1000 + 3000);
  }
  for (let i = 0; i < 8; i++) setTimeout(spawnBalloon, i * 500);
  setInterval(spawnBalloon, 2200);
}

function moreBurst() {
  const colors = ['#ffd700','#ff6b9d','#fffacd','#ffffff','#ff4500','#7b2fbe','#00bfff'];
  for (let i = 0; i < 28; i++) {
    const dot = document.createElement('div');
    dot.className = 'star-burst';
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 160;
    dot.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    dot.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    dot.style.left = (50 + Math.cos(angle) * 10) + '%';
    dot.style.top = '60%';
    dot.style.background = colors[Math.floor(Math.random() * colors.length)];
    dot.style.width = dot.style.height = (4 + Math.random() * 6) + 'px';
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 1300);
  }
  for (let i = 0; i < 40; i++) particles.push(new Particle());
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
      b.style.left = (Math.random() * 90 + 5) + '%';
      b.style.animationDuration = '7s';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 8000);
    }, i * 200);
  }
}

setTimeout(reveal, 400);
</script>
</body>
</html>
